<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Quiz Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1f4037,#99f2c8);
  transition:0.4s;
}
.dark{
  background:linear-gradient(135deg,#141e30,#243b55);
}
.container{
  width:95%;
  max-width:650px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  color:white;
}
h1{text-align:center;margin-bottom:10px;}
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);}
.option{background:rgba(255,255,255,0.3);}
.option:hover{background:#00c6ff;}
.hidden{display:none;}
.progress{
  height:8px;
  background:rgba(255,255,255,0.3);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:8px;
}
.bar{
  height:100%;
  width:0%;
  background:#00c6ff;
  transition:0.4s;
}
.timer{text-align:right;font-size:14px;}
.leaderboard{
  background:rgba(0,0,0,0.3);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.toggle{
  position:absolute;
  top:15px;
  right:20px;
  cursor:pointer;
  font-size:14px;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="toggle" onclick="toggleMode()">🌙 Toggle Mode</div>
<canvas id="confetti"></canvas>

<div class="container">

<h1>Ultimate Quiz Maker</h1>

<div id="auth">
<input id="username" placeholder="Enter Username">
<button onclick="login()">Login</button>
</div>

<div id="menu" class="hidden">
<button onclick="showCreate()">Create Quiz</button>
<button onclick="showList()">Take Quiz</button>
<button onclick="showLeaderboard()">Leaderboard</button>
</div>

<div id="create" class="hidden">
<input id="title" placeholder="Quiz Title">
<textarea id="question" placeholder="Question"></textarea>
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="correct" placeholder="Correct Option (1-3)">
<button onclick="addQ()">Add Question</button>
<button onclick="saveQuiz()">Save Quiz</button>
<button onclick="home()">Back</button>
<div id="preview"></div>
</div>

<div id="list" class="hidden">
<div id="quizList"></div>
<button onclick="home()">Back</button>
</div>

<div id="quiz" class="hidden">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="timer">Time Left: <span id="time">15</span>s</div>
<h3 id="qText"></h3>
<div id="options"></div>
</div>

<div id="result" class="hidden">
<h2 id="scoreText"></h2>
<button onclick="home()">Back</button>
</div>

<div id="leaderboard" class="hidden leaderboard"></div>

</div>

<script>
let quizzes=JSON.parse(localStorage.getItem("quizzes"))||[];
let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];
let user="",newQs=[];
let current,index=0,score=0,timer,seconds=15;

function toggleMode(){document.body.classList.toggle("dark");}

function login(){
  user=username.value;
  if(!user)return alert("Enter username");
  auth.classList.add("hidden");
  menu.classList.remove("hidden");
}

function showCreate(){hide();create.classList.remove("hidden");}
function showList(){hide();list.classList.remove("hidden");display();}
function showLeaderboard(){
  hide();
  leaderboardDiv=document.getElementById("leaderboard");
  leaderboardDiv.classList.remove("hidden");
  leaderboardDiv.innerHTML="<h3>🏆 Leaderboard</h3>";
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard.forEach(l=>{
    leaderboardDiv.innerHTML+=`${l.user} - ${l.score}%<br>`;
  });
}
function home(){hide();menu.classList.remove("hidden");}
function hide(){
  create.classList.add("hidden");
  list.classList.add("hidden");
  quiz.classList.add("hidden");
  result.classList.add("hidden");
  document.getElementById("leaderboard").classList.add("hidden");
}

function addQ(){
  let q=question.value;
  let opts=[o1.value,o2.value,o3.value];
  let c=parseInt(correct.value)-1;
  newQs.push({q,opts,c});
  preview.innerHTML+="✔ "+q+"<br>";
  question.value=o1.value=o2.value=o3.value="";
}

function saveQuiz(){
  quizzes.push({title:title.value,questions:newQs});
  localStorage.setItem("quizzes",JSON.stringify(quizzes));
  alert("Quiz Saved!");
  newQs=[];preview.innerHTML="";
}

function display(){
  quizList.innerHTML="";
  quizzes.forEach((q,i)=>{
    quizList.innerHTML+=`<p>${q.title}</p>
    <button onclick="start(${i})">Start</button><hr>`;
  });
}

function start(i){
  current=quizzes[i];
  current.questions.sort(()=>Math.random()-0.5);
  index=0;score=0;
  hide();quiz.classList.remove("hidden");
  showQ();
}

function showQ(){
  let q=current.questions[index];
  qText.innerText=q.q;
  options.innerHTML="";
  q.opts.forEach((opt,i)=>{
    options.innerHTML+=`<button class="option" onclick="check(${i})">${opt}</button>`;
  });
  bar.style.width=(index/current.questions.length)*100+"%";
  startTimer();
}

function startTimer(){
  seconds=15;
  time.innerText=seconds;
  clearInterval(timer);
  timer=setInterval(()=>{
    seconds--;
    time.innerText=seconds;
    if(seconds==0){clearInterval(timer);next();}
  },1000);
}

function check(i){
  if(i===current.questions[index].c)score++;
  clearInterval(timer);
  next();
}

function next(){
  index++;
  if(index<current.questions.length)showQ();
  else showResult();
}

function showResult(){
  hide();result.classList.remove("hidden");
  let percent=Math.round((score/current.questions.length)*100);
  scoreText.innerHTML=`${user}, Your Score: ${percent}%`;
  leaderboard.push({user,score:percent});
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
  if(percent>=80)launchConfetti();
}

function launchConfetti(){
  const canvas=document.getElementById("confetti");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  let pieces=[];
  for(let i=0;i<150;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*150
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
      ctx.fill();
      p.y+=Math.random()*5;
      if(p.y>canvas.height)p.y=0;
    });
  }
  setInterval(draw,20);
}
</script>

</body>
</html>
